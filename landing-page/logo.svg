<svg width="280" height="60" viewBox="0 0 280 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Energie Solaire France -->
  <g id="logo">
    <!-- Sun icon (orange) -->
    <circle cx="30" cy="30" r="18" fill="#FF8C00"/>

    <!-- Sun rays (orange) -->
    <path d="M30 4 L30 0" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
    <path d="M30 60 L30 56" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
    <path d="M4 30 L0 30" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
    <path d="M60 30 L56 30" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
    <path d="M10.5 10.5 L7.5 7.5" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
    <path d="M49.5 49.5 L52.5 52.5" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
    <path d="M49.5 10.5 L52.5 7.5" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
    <path d="M10.5 49.5 L7.5 52.5" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>

    <!-- Solar panel grid on sun (blue) -->
    <rect x="24" y="24" width="12" height="12" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="24" y1="28" x2="36" y2="28" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="24" y1="32" x2="36" y2="32" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="28" y1="24" x2="28" y2="36" stroke="#1e3a8a" stroke-width="1"/>
    <line x1="32" y1="24" x2="32" y2="36" stroke="#1e3a8a" stroke-width="1"/>

    <!-- Company name -->
    <text x="70" y="28" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e3a8a">
      ÉNERGIE SOLAIRE
    </text>
    <text x="70" y="48" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FF8C00">
      FRANCE
    </text>
  </g>
</svg>

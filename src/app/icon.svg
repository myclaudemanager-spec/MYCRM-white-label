<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#f59e0b" />

  <!-- Sun rays -->
  <g fill="#fbbf24">
    <circle cx="32" cy="8" r="3" />
    <circle cx="48" cy="16" r="3" />
    <circle cx="56" cy="32" r="3" />
    <circle cx="48" cy="48" r="3" />
    <circle cx="32" cy="56" r="3" />
    <circle cx="16" cy="48" r="3" />
    <circle cx="8" cy="32" r="3" />
    <circle cx="16" cy="16" r="3" />
  </g>

  <!-- Solar panel (3x3 grid) -->
  <g fill="#1e3a8a" stroke="#fff" stroke-width="1.5">
    <rect x="20" y="20" width="8" height="8" rx="1" />
    <rect x="28" y="20" width="8" height="8" rx="1" />
    <rect x="36" y="20" width="8" height="8" rx="1" />
    <rect x="20" y="28" width="8" height="8" rx="1" />
    <rect x="28" y="28" width="8" height="8" rx="1" />
    <rect x="36" y="28" width="8" height="8" rx="1" />
    <rect x="20" y="36" width="8" height="8" rx="1" />
    <rect x="28" y="36" width="8" height="8" rx="1" />
    <rect x="36" y="36" width="8" height="8" rx="1" />
  </g>

  <!-- Highlight on panel -->
  <g fill="#3b82f6" opacity="0.3">
    <rect x="21" y="21" width="6" height="3" rx="0.5" />
    <rect x="29" y="21" width="6" height="3" rx="0.5" />
    <rect x="37" y="21" width="6" height="3" rx="0.5" />
  </g>
</svg>
